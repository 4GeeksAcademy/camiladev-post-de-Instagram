<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Post-de-Instagram</title>
</head>
<body>
    <header>
        <div id="tittle">
            <h1>Breathe Code Photo Feed</h1>
        </div>
    </header>

    <main>
        <div class="section">
            <div class="header">
                <div class="subtittle">
                <h2>My first photo</h2>
            </div>
            <div class="date">
                <p>12/14</p>
            </div>
            </div>
           
            <div class="photo">
                <img src="images/image-cat.webp" alt="Foto de gatito negro descansando en su cama">
            </div>
            <div class="text">
                <p>This is my first photo on the feed. It is my cat.</p>

            </div>

        </div>
        <div class="section">
            <div class="header">
                <div class="subtittle">
                <h2>My second photo</h2>
            </div>
            <div class="date">
                <p>13/14</p>
            </div>
            </div>
           
            <div class="photo">
                <img src="images/another-image-cat.webp" alt="Otra foto de gatito negro descansando en su cama">
            </div>
            <div class="text">
                <p>This is another photo of my cat.</p>

            </div>

        </div>
        <div class="section">
            <div class="header">
                <div class="subtittle">
                <h2>My third photo</h2>
            </div>
            <div class="date">
                <p>14/14</p>
            </div>
            </div>
           
            <div class="photo">
                <img src="images/pizza.webp" alt="Pizza deliciosa.">
            </div>
            <div class="text">
                <p>Pizza time!</p>

            </div>

        </div>
        <div class="section">
            <div class="header">
                <div class="subtittle">
                <h2>My fourth photo</h2>
            </div>
            <div class="date">
                <p>15/14</p>
            </div>
            </div>
           
            <div class="photo">
                <img src="images/rolls.webp" alt="Rolls de canela">
            </div>
            <div class="text">
                <p>Cinnamon rolls.</p>

            </div>

        </div>
    </main>
</body>
</html>
